# .ddev/config.yaml
# ---------------------------------------------------------------------------
# Merge this into (or replace) your existing .ddev/config.yaml in the repo.
#
# The project name and additional_fqdns are set at deploy time by
# deploy-preview.sh via `ddev config --project-name=... --additional-fqdns=...`
# so the values below are just defaults for local development.
#
# Adjust docroot, php_version, webserver_type, and database version to match
# your project. The site identifier ('main') in any hooks below should match
# your TYPO3 site folder name.
# ---------------------------------------------------------------------------

name: your-project          # overridden per-MR by deploy-preview.sh
type: typo3
docroot: public             # adjust to your TYPO3 web root (public or web)
php_version: "8.2"
webserver_type: nginx-fpm
database:
  type: mariadb
  version: "10.11"
